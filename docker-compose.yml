services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: SolutionOrdersDB
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres123
    ports:
      - "5432:5432"
    networks:
      - dev-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 10s
      retries: 10
      start_period: 30s

  api:
    build:
      context: ./SolutionOrdersAPI
      dockerfile: SolutionOrdersAPI/Dockerfile
    container_name: solutionorders-api
    ports:
      - "5001:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:8080
      - ConnectionStrings__DefaultConnection=Host=postgres;Database=SolutionOrdersDB;Username=postgres;Password=postgres123
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - dev-network

networks:
  dev-network:
    driver: bridge